services:
  db:
    image: mysql:8.0
    container_name: brumh_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init_db:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: brumh_api
    restart: always
    environment:
      NODE_ENV: production
      # Inyectamos todas las variables del .env de la raíz
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      JWT_SECRET: ${JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      BACKEND_URL: ${BACKEND_URL}
      WEB_URL: ${WEB_URL}
      PREMIUM_PAYMENT_URL: ${PREMIUM_PAYMENT_URL}
    ports:
      - "3000:3000"
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: brumh_pma
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
